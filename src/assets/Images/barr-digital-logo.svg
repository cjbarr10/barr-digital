  <rect x="34" y="4"  width="30" height="30" rx="4" fill="#4A9FD4"/>
  <rect x="0"  y="38" width="30" height="30" rx="4" fill="#4A9FD4" fill-opacity="0.30"/>
  <rect x="34" y="38" width="30" height="30" rx="4" fill="#0D1B2A" fill-opacity="0.10"/>

